name: Signal Cron

on:
  workflow_dispatch:

jobs:
  dynamic-spot-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call signal scanner
        run: |
          APP_URL="${{ secrets.VERCEL_APP_URL }}"
          APP_URL="${APP_URL%/}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://cross-market-signal-alerts.vercel.app"
          fi

          curl --fail --show-error --silent \
            --get "$APP_URL/api/cron" \
            --data-urlencode "secret=${{ secrets.CRON_SECRET }}" \
            --data-urlencode "groups=dynamic-spot,futures-scalp-a,futures-scalp-b"

  hourly-signal-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
