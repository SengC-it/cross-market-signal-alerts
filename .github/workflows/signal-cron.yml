name: Signal Cron

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

jobs:
  run-signal-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [crypto-core-a, crypto-core-b, crypto-alt-a, crypto-alt-b, crypto-alt-c, futures-core, tradfi]
    timeout-minutes: 10
    steps:
      - name: Call signal scanner
        run: |
          curl --fail --show-error --silent \
            --get "${{ secrets.VERCEL_APP_URL }}/api/cron" \
            --data-urlencode "secret=${{ secrets.CRON_SECRET }}" \
            --data-urlencode "group=${{ matrix.group }}"
